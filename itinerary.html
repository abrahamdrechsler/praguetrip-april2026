<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prague & Turnov — Itinerary Planner</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --card-border: #e5e7eb;
    --accent: #1a1a1a;
    --accent-dim: #374151;
    --green: #16a34a;
    --yellow: #ca8a04;
    --red: #dc2626;
    --orange: #ea580c;
    --blue: #2563eb;
    --text: #1f2937;
    --text-dim: #6b7280;
    --text-muted: #9ca3af;
    --tag-bg: #f3f4f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--card-border);
    padding: 12px 16px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .tabs {
    display: flex;
    gap: 0;
    padding: 0 16px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 62px;
    z-index: 99;
    border-bottom: 1px solid var(--card-border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
    text-decoration: none;
    display: inline-block;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab:hover:not(.active) {
    color: var(--text);
  }

  /* Day tiles strip */
  .day-strip {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 108px;
    z-index: 99;
    border-bottom: 1px solid var(--card-border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .day-strip::-webkit-scrollbar { display: none; }

  .day-tile {
    flex-shrink: 0;
    width: 72px;
    padding: 8px 6px;
    border-radius: 10px;
    border: 2px solid var(--card-border);
    background: var(--card-bg);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    user-select: none;
    position: relative;
  }

  .day-tile:hover {
    border-color: var(--text-muted);
  }

  .day-tile.active {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transform: translateY(-1px);
  }

  .day-tile.loc-prague { border-color: var(--blue); }
  .day-tile.loc-prague.active { border-color: var(--blue); background: #eff6ff; }
  .day-tile.loc-turnov { border-color: var(--green); }
  .day-tile.loc-turnov.active { border-color: var(--green); background: #f0fdf4; }
  .day-tile.loc-travel { border-color: var(--orange); }
  .day-tile.loc-travel.active { border-color: var(--orange); background: #fff7ed; }

  .day-tile .day-abbr {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .day-tile .day-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-top: 2px;
  }

  .day-tile .day-loc {
    font-size: 10px;
    font-weight: 600;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .day-tile.loc-prague .day-loc { color: var(--blue); }
  .day-tile.loc-turnov .day-loc { color: var(--green); }
  .day-tile.loc-travel .day-loc { color: var(--orange); }

  .day-tile .plan-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
  }

  .day-tile.has-plan .plan-dot { display: block; }

  /* Main content area */
  .main-area {
    display: flex;
    gap: 20px;
    padding: 20px 16px;
    max-width: 1200px;
    margin: 0 auto;
    min-height: calc(100vh - 140px);
  }

  .plans-col {
    width: 40%;
    flex-shrink: 0;
  }

  .detail-col {
    width: 60%;
    flex-grow: 1;
  }

  .col-header {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .clear-btn {
    font-size: 12px;
    font-weight: 600;
    color: var(--red);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.2s;
    display: none;
  }

  .clear-btn.visible { display: inline-block; }
  .clear-btn:hover { background: #fef2f2; }

  .plan-card {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .plan-card:hover {
    border-color: var(--text-muted);
  }

  .plan-card.selected {
    border-color: var(--blue);
    background: #f8faff;
  }

  .plan-card .plan-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .plan-card .plan-name .checkmark {
    display: none;
    color: var(--blue);
    font-size: 16px;
  }

  .plan-card.selected .plan-name .checkmark { display: inline; }

  .plan-card .plan-summary {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.4;
  }

  .plan-card .plan-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text-dim);
  }

  .tag.rec { background: #fef3c7; color: #92400e; }
  .tag.warn { background: #fef2f2; color: var(--red); }

  /* Detail panel */
  .detail-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 24px;
    min-height: 300px;
  }

  .detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--text-muted);
    font-size: 15px;
  }

  .detail-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .detail-day-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  /* Timeline */
  .timeline {
    position: relative;
    padding-left: 28px;
    margin-bottom: 24px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--card-border);
    border-radius: 1px;
  }

  .timeline-step {
    position: relative;
    padding-bottom: 18px;
  }

  .timeline-step:last-child { padding-bottom: 0; }

  .timeline-step::before {
    content: '';
    position: absolute;
    left: -22px;
    top: 6px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--blue);
    border: 2px solid white;
    box-shadow: 0 0 0 2px var(--blue);
    z-index: 1;
  }

  .timeline-step.green::before { background: var(--green); box-shadow: 0 0 0 2px var(--green); }
  .timeline-step.orange::before { background: var(--orange); box-shadow: 0 0 0 2px var(--orange); }

  .timeline-time {
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
  }

  .timeline-step.green .timeline-time { color: var(--green); }
  .timeline-step.orange .timeline-time { color: var(--orange); }

  .timeline-desc {
    font-size: 14px;
    color: var(--text);
    margin-top: 2px;
    line-height: 1.5;
  }

  /* Info sections */
  .info-section {
    margin-bottom: 20px;
  }

  .info-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--card-border);
  }

  .info-card {
    background: var(--tag-bg);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .info-card .info-card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .info-card .info-card-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .info-card .info-card-price {
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    margin-top: 2px;
  }

  .practical-list {
    list-style: none;
    padding: 0;
  }

  .practical-list li {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 0;
    padding-left: 16px;
    position: relative;
  }

  .practical-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 11px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--card-border);
  }

  .detail-tags .tag {
    font-size: 12px;
    padding: 4px 10px;
  }

  .map-container {
    margin-bottom: 20px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--card-border);
  }

  .map-container iframe {
    display: block;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .main-area {
      flex-direction: column;
      gap: 16px;
      padding: 12px;
    }

    .plans-col, .detail-col {
      width: 100%;
    }

    .detail-panel {
      padding: 16px;
    }

    .header {
      padding: 10px 12px;
    }

    .day-strip {
      padding: 10px 12px;
      gap: 6px;
    }

    .day-tile {
      width: 64px;
      padding: 6px 4px;
    }

    .mobile-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      transition: all 0.2s;
    }

    .mobile-toggle:hover { background: var(--tag-bg); }

    .detail-col.collapsed .detail-panel { display: none; }
    .detail-col.collapsed .mobile-toggle .toggle-arrow { transform: rotate(0deg); }
  }

  @media (min-width: 769px) {
    .mobile-toggle { display: none; }
  }

  .toggle-arrow {
    margin-left: 6px;
    transition: transform 0.2s;
    transform: rotate(180deg);
    display: inline-block;
  }
</style>
</head>

// State
let selectedDayId = DAYS[0].id;
let selections = {};

// Load from localStorage
function loadSelections() {
  try {
    const saved = localStorage.getItem('praguetrip_itinerary');
    if (saved) selections = JSON.parse(saved);
  } catch (e) {}
}

function saveSelections() {
  try {
    localStorage.setItem('praguetrip_itinerary', JSON.stringify(selections));
  } catch (e) {}
}

// Render day strip
function renderDayStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = DAYS.map(d => {
    const locClass = d.location === 'Prague' ? 'loc-prague' : d.location === 'Turnov' ? 'loc-turnov' : 'loc-travel';
    const activeClass = d.id === selectedDayId ? 'active' : '';
    const hasPlan = selections[d.id] !== undefined ? 'has-plan' : '';
    return `<div class="day-tile ${locClass} ${activeClass} ${hasPlan}" onclick="selectDay('${d.id}')">
      <div class="plan-dot"></div>
      <div class="day-abbr">${d.dow}</div>
      <div class="day-date">${d.date}</div>
      <div class="day-loc">${d.location}</div>
    </div>`;
  }).join('');

  // Scroll active tile into view
  const activeTile = strip.querySelector('.day-tile.active');
  if (activeTile) {
    activeTile.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }
}

// Render plans list
function renderPlans() {
  const day = DAYS.find(d => d.id === selectedDayId);
  if (!day) return;

  const list = document.getElementById('plansList');
  const clearBtn = document.getElementById('clearBtn');

  if (day.fixed) {
    clearBtn.className = 'clear-btn';
    list.innerHTML = `<div style="padding:32px 16px;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;">${day.fixedIcon || '📅'}</div>
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;">${day.date} — ${day.label}</div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.7;">${day.fixedMessage || ''}</div>
    </div>`;
    return;
  }

  const selectedIdx = selections[selectedDayId];
  clearBtn.className = selectedIdx !== undefined ? 'clear-btn visible' : 'clear-btn';

  list.innerHTML = day.plans.map((p, i) => {
    const sel = selectedIdx === i ? 'selected' : '';
    const tags = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const recTag = p.recommended ? '<span class="tag rec">Recommended</span>' : '';
    const warnTag = p.warning ? '<span class="tag warn">Warning</span>' : '';
    return `<div class="plan-card ${sel}" onclick="selectPlan(${i})">
      <div class="plan-name">
        <span class="checkmark">&#10003;</span>
        ${p.name}
      </div>
      <div class="plan-summary">${p.summary}</div>
      <div class="plan-tags">${recTag}${warnTag}${tags}</div>
    </div>`;
  }).join('');
}

// Render detail panel
function renderDetail() {
  const day = DAYS.find(d => d.id === selectedDayId);
  if (!day) return;

  const empty = document.getElementById('detailEmpty');
  const content = document.getElementById('detailContent');
  const selectedIdx = selections[selectedDayId];

  if (day.fixed) {
    empty.style.display = 'none';
    content.style.display = 'block';
    content.innerHTML = `<div style="padding:60px 24px;text-align:center;">
      <div style="font-size:56px;margin-bottom:16px;">${day.fixedIcon || '📅'}</div>
      <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px;">${day.date} — ${day.label}</div>
      <div style="font-size:14px;color:var(--text-dim);line-height:1.8;max-width:360px;margin:0 auto;">${day.fixedMessage || ''}</div>
    </div>`;
    return;
  }

  if (selectedIdx === undefined) {
    empty.style.display = 'flex';
    content.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  content.style.display = 'block';

  const plan = day.plans[selectedIdx];
  if (!plan) return;

  const dayLabel = day.label ? ` - ${day.label}` : '';

  // Timeline
  const timelineHTML = plan.timeline.map(step => {
    const colorClass = step.color === 'green' ? 'green' : step.color === 'orange' ? 'orange' : '';
    return `<div class="timeline-step ${colorClass}">
      <div class="timeline-time">${step.time}</div>
      <div class="timeline-desc">${step.desc}</div>
    </div>`;
  }).join('');

  // Map
  const mapHTML = plan.mapQuery ? `<div class="map-container">
    <iframe src="https://maps.google.com/maps?q=${plan.mapQuery}&z=${plan.mapZoom}&output=embed" width="100%" height="250" style="border:0;border-radius:8px" allowfullscreen loading="lazy"></iframe>
  </div>` : '';

  // Food
  const foodHTML = plan.food.length ? `<div class="info-section">
    <div class="info-section-title">Food Options</div>
    ${plan.food.map(f => `<div class="info-card">
      <div class="info-card-title">${f.name}</div>
      <div class="info-card-desc">${f.desc}</div>
      <div class="info-card-price">${f.price}</div>
    </div>`).join('')}
  </div>` : '';

  // Practical
  const practicalHTML = plan.practical.length ? `<div class="info-section">
    <div class="info-section-title">Practical Info</div>
    <ul class="practical-list">
      ${plan.practical.map(p => `<li>${p}</li>`).join('')}
    </ul>
  </div>` : '';

  // Warning
  const warningHTML = plan.warning ? `<div class="info-card" style="background:#fef2f2;margin-bottom:20px;">
    <div class="info-card-title" style="color:var(--red);">Warning</div>
    <div class="info-card-desc" style="color:#991b1b;">${plan.warning}</div>
  </div>` : '';

  // Tags
  const tagsHTML = plan.tags.length ? `<div class="detail-tags">
    ${plan.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    ${plan.recommended ? '<span class="tag rec">Recommended</span>' : ''}
  </div>` : '';

  // Turnov transport info (shown on all Turnov/Travel-to-Turnov days)
  const turnovTransportHTML = (day.location === 'Turnov' || (day.id === 'apr10') || (day.id === 'apr15')) ? `<div class="info-section">
    <div class="info-section-title">Turnov Transport Info</div>
    <div class="info-card" style="background:#f0fdf4;">
      <div class="info-card-title" style="color:var(--green);">Getting Around</div>
      <ul class="practical-list">
        <li><strong>Taxi:</strong> Call the day before based on weather. Pickup/dropoff model -- they drop you at the start and pick you up at a designated spot later.</li>
        <li><strong>Train to Mala Skala:</strong> 9 min from Turnov, roughly hourly, ~50 CZK</li>
        <li><strong>mapy.cz app:</strong> Download for excellent trail maps (works offline)</li>
        <li><strong>cd.cz / idos.cz app:</strong> Download for Czech train schedules</li>
      </ul>
    </div>
  </div>` : '';

  content.innerHTML = `
    <div class="detail-title">${plan.name}</div>
    <div class="detail-day-label">${day.dow}, ${day.date}${dayLabel} &middot; ${day.location}</div>
    ${warningHTML}
    <div class="info-section">
      <div class="info-section-title">Timeline</div>
      <div class="timeline">${timelineHTML}</div>
    </div>
    ${mapHTML}
    ${foodHTML}
    ${practicalHTML}
    ${turnovTransportHTML}
    ${tagsHTML}
  `;
}

function selectDay(dayId) {
  selectedDayId = dayId;
  renderDayStrip();
  renderPlans();
  renderDetail();
}

function selectPlan(idx) {
  const current = selections[selectedDayId];
  if (current === idx) {
    delete selections[selectedDayId];
  } else {
    selections[selectedDayId] = idx;
  }
  saveSelections();
  renderDayStrip();
  renderPlans();
  renderDetail();
}

function clearSelection() {
  delete selections[selectedDayId];
  saveSelections();
  renderDayStrip();
  renderPlans();
  renderDetail();
}

function toggleDetail() {
  const col = document.getElementById('detailCol');
  col.classList.toggle('collapsed');
  const arrow = col.querySelector('.toggle-arrow');
  if (col.classList.contains('collapsed')) {
    arrow.style.transform = 'rotate(0deg)';
  } else {
    arrow.style.transform = 'rotate(180deg)';
  }
}

// Init
loadSelections();
renderDayStrip();
renderPlans();
renderDetail();
</script>
